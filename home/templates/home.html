{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto - PDI</title>
    
    <!-- Importação do bootstrap e ícones que podemos utilizar -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <!-- Link para o css personalizado (caso precisemos) -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="bg-light">

<div class="container-fluid vh-100 d-flex flex-column p-3">
    
    <div class="row mb-3">
        <div class="col-12 card shadow-sm p-0">
            <div class="card-body py-2">
                <h6 class="card-title fw-bold mb-2"><i class="bi bi-file-earmark-image"></i> Envie a imagem (.png)</h6>
                <div class="input-group input-group-sm">
                    <input type="file" class="form-control" id="imageInput" accept="image/png">
                    <button class="btn btn-warning" type="button" id="btnLoad">Carregar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-2 h-100 card shadow-sm p-0">
                <div class="card-header bg-success text-white">
                    <span class="fw-bold">Processos</span>
                </div>
                <div class="list-group list-group-flush scrollable-panel" id="processSelector">
                    <button class="list-group-item list-group-item-action active" data-process="original">Original</button>
                    <button class="list-group-item list-group-item-action" data-process="negative">Negativo</button>
                    <button class="list-group-item list-group-item-action" data-process="log">Transformação Logarítmica</button>
                    <button class="list-group-item list-group-item-action" data-process="threshold">Limiarização</button>
                    <button class="list-group-item list-group-item-action" data-process="gaussian">Filtro Gaussiano</button>
                    <button class="list-group-item list-group-item-action" data-process="sobel">Bordas de Sobel</button>
                </div>
        
        </div>

        <div class="col-lg-10 col-sm-12 d-flex flex-column ">
            
            <div class="row">
                <div class="col-sm-12 col-md-6 col-lg-6 card shadow-sm p-0">
                    <div class="card-header bg-primary text-white py-1 text-center small">Imagem Original</div>
                    <div class="card-body d-flex align-items-center justify-content-center bg-white canvas-area">
                        <img id="imgInput" src="" class="img-fluid d-none">
                        <div id="placeholderInput" class="text-muted"><i class="bi bi-upload fs-1"></i></div>
                    </div>
                </div>
                <div class="col-sm-12 col-md-6 col-lg-6 card shadow-sm p-0">
                    <div class="card-header bg-danger text-white py-1 text-center small">Imagem Processada</div>
                    <div class="card-body d-flex align-items-center justify-content-center bg-white canvas-area">
                        <img id="imgOutput" src="" class="img-fluid d-none">
                        <div id="placeholderOutput" class="text-muted"><i class="bi bi-magic fs-1"></i></div>
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-12 card shadow-sm p-0">
                    <div class="card-header bg-info text-dark py-1 fw-bold">Parâmetros</div>
                    <div class="card-body py-2" id="paramsContainer">
                        <span class="text-muted small italic">Nenhum parâmetro para o processo atual.</span>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12 card shadow-sm p-0">
                    <div class="card-header py-1 small fw-bold">Dados/Imagens acessórias</div>
                    <div class="card-body p-2 text-center" id="accessoryData">
                        <small class="text-muted">Informações de histograma ou metadados aparecerão aqui.</small>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.min.js"></script>
<script src="{% static 'js/pdi_processor.js' %}"></script>

</body>
</html>
